# Push do main → build + GitHub Release (latest.json + paczki updater).
# Wersja z package.json (sync-version → Cargo.toml + tauri.conf.json).

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
