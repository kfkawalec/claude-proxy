  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: node scripts/sync-version.cjs
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: npm ci
      - name: createUpdaterArtifacts
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle.createUpdaterArtifacts=true;fs.writeFileSync(p,JSON.stringify(j,null,2));"
      - run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Collect NSIS + MSI + sig
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-windows | Out-Null
          Get-ChildItem "src-tauri/target/release/bundle/nsis" -File | Copy-Item -Destination updater-windows/
          if (Test-Path "src-tauri/target/release/bundle/msi") {
            Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Copy-Item -Destination updater-windows/
          }
      - uses: actions/upload-artifact@v5
        with:
          name: updater-windows
          path: updater-windows/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: node scripts/sync-version.cjs
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: createUpdaterArtifacts
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle.createUpdaterArtifacts=true;fs.writeFileSync(p,JSON.stringify(j,null,2));"
      - run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - run: |
          mkdir -p updater-macos
          set -e
          MACOS_BUNDLE="src-tauri/target/release/bundle/macos"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          find "$MACOS_BUNDLE" -maxdepth 1 -type f -name '*.app.tar.gz' -exec cp {} updater-macos/ \;
          find "$MACOS_BUNDLE" -maxdepth 1 -type f -name '*.sig' -exec cp {} updater-macos/ \;
          if [ -d "$DMG_DIR" ]; then
            find "$DMG_DIR" -maxdepth 1 -type f -name '*.dmg' -exec cp {} updater-macos/ \;
          fi
          ARCH=$(uname -m)
          case "$ARCH" in
            arm64) echo "darwin-aarch64" > updater-macos/platform.txt ;;
            x86_64) echo "darwin-x86_64" > updater-macos/platform.txt ;;
            *) echo "unsupported arch $ARCH"; exit 1 ;;
          esac
      - uses: actions/upload-artifact@v5
        with:
          name: updater-macos
          path: updater-macos/

  publish:
    # needs: [build-linux, build-windows, build-macos]
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: ver
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # - uses: actions/download-artifact@v5
      #   with:
      #     name: updater-linux
      #     path: updater-linux
      - uses: actions/download-artifact@v5
        with:
          name: updater-windows
          path: updater-windows
      - uses: actions/download-artifact@v5
        with:
          name: updater-macos
          path: updater-macos

      - name: Merge latest.json
        env:
          PUBLIC_ASSET_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.VERSION }}
          UPDATER_ASSET_URL_MODE: flat
          MANIFEST_OUTPUT: updater/latest.json
          MANIFEST_NOTES: "Release v${{ steps.ver.outputs.VERSION }}"
        run: |
          chmod +x scripts/updater-manifest.sh
          ./scripts/updater-manifest.sh updater-linux updater-windows updater-macos

      - name: Stage files for GitHub Release
        run: |
          mkdir -p release
          # cp -v updater-linux/* release/
          cp -v updater-windows/* release/
          find updater-macos -maxdepth 1 -type f ! -name 'platform.txt' -exec cp -v {} release/ \;
          cp -v updater/latest.json release/latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: v${{ steps.ver.outputs.VERSION }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
