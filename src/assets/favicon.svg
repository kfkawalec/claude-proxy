<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7b54"/>
      <stop offset="100%" style="stop-color:#e8541a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9f6b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff7b54;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (bez obwódki — czytelniej w małych rozmiarach) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <g>
    <!-- Claude-inspired "C" arc shape (bez dodatkowego scale — spójne z tray-icon.svg) -->
    <path d="M 19 8
             A 8.5 8.5 0 1 0 19 24
             L 19 21
             A 5.5 5.5 0 1 1 19 11
             Z"
          fill="url(#orange)" opacity="0.95"/>

    <!-- Proxy arrow — horizontal line through the C opening -->
    <line x1="18" y1="16" x2="26" y2="16" stroke="url(#arrow)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polyline points="23,13 26,16 23,19" fill="none" stroke="#ff7b54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small dot at entry — proxy relay dot -->
    <circle cx="19.5" cy="16" r="1.2" fill="#ff9f6b"/>
  </g>
</svg>
